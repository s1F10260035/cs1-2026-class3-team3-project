<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Filter Test</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Tag Filter Test</h1>

    <h2>Cover版</h2>
    <section id="cover-test" class="cover-list"></section>

    <h2>Row版</h2>
    <section id="row-test"></section>

    <h2>一覧生成</h2>
    <h3>Cover一覧</h3>
    <div id="cover-list"></div>
    <h3>Row一覧</h3>
    <div id="row-list"></div>
    <!-- ここまでが画面構成のためのHTML -->

    <!-- ここからJSのスクリプト -->
    <script src="js/games.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <script>
    function getGameById(id) {
        return games.find(game => game.id === id);
    }

    const stellaris = getGameById("stellaris");
    const minecraft = getGameById("minecraft");
    const valorant = getGameById("valorant");

    /* 個別表示 */
    document.getElementById("cover-test").innerHTML =
        GameCard(stellaris, "cover") +
        GameCard(minecraft, "cover") +
        GameCard(valorant, "cover");

    document.getElementById("row-test").innerHTML =
        GameCard(stellaris, "row") +
        GameCard(minecraft, "row") +
        GameCard(valorant, "row");

    /* 自動一覧 */
    document.getElementById("cover-list").innerHTML =
        games.map(game => GameCard(game, "cover")).join("");

    document.getElementById("row-list").innerHTML =
        games.map(game => GameCard(game, "row")).join("");
    </script>

</body>
</html>
